<!-- @dsCard group="Colors" viewport="700x110" name="Gold Accent" subtitle="Primary accent scale — gold through gold-d + dim" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);padding:16px;font-family:var(--font-body)}</style>
</head><body>
<div style="display:flex;gap:6px">
  <div style="flex:1;height:68px;background:var(--gold-l);border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
    <div style="font-size:10px;font-weight:700;color:rgba(0,0,0,.6);letter-spacing:.5px">--gold-l</div>
    <div style="font-size:10px;color:rgba(0,0,0,.5);font-family:var(--font-mono)">#d4b050</div>
  </div>
  <div style="flex:1.5;height:68px;background:var(--gold);border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
    <div style="font-size:10px;font-weight:700;color:rgba(0,0,0,.65);letter-spacing:.5px">--gold (primary)</div>
    <div style="font-size:10px;color:rgba(0,0,0,.5);font-family:var(--font-mono)">#c09a3a</div>
  </div>
  <div style="flex:1;height:68px;background:var(--gold-d);border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
    <div style="font-size:10px;font-weight:700;color:rgba(0,0,0,.5);letter-spacing:.5px">--gold-d</div>
    <div style="font-size:10px;color:rgba(0,0,0,.4);font-family:var(--font-mono)">#8b7332</div>
  </div>
  <div style="flex:1;height:68px;background:var(--gold-dim);border:1px solid var(--gold-d);border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
    <div style="font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px">--gold-dim</div>
    <div style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">rgba gold .12</div>
  </div>
</div>
</body></html>
