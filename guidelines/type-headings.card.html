<!-- @dsCard group="Type" viewport="700x160" name="Headings — Oswald" subtitle="Condensed uppercase — nav, section titles, labels, CTAs" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg-3);padding:20px;font-family:var(--font-body)}</style>
</head><body>
<div style="display:flex;flex-direction:column;gap:8px">
  <div style="display:flex;align-items:baseline;gap:14px">
    <span style="font-family:var(--font-heading);font-size:28px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;min-width:220px">CRONÓGRAFO</span>
    <span style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">28px · 700 · 2px · App title</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px">
    <span style="font-family:var(--font-heading);font-size:16px;font-weight:600;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;min-width:220px">VELOCIDADES (FPS)</span>
    <span style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">16px · 600 · 1.5px · Section header</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px">
    <span style="font-family:var(--font-heading);font-size:12px;font-weight:600;color:var(--gold);letter-spacing:2px;text-transform:uppercase;min-width:220px">CARGA 1</span>
    <span style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">12px · 600 · 2px · Table header / column label</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px">
    <span style="font-family:var(--font-heading);font-size:11px;font-weight:700;color:var(--text-2);letter-spacing:1.5px;text-transform:uppercase;min-width:220px">ENTRAR</span>
    <span style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">11px · 700 · 1.5px · Nav button / CTA</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:14px">
    <span style="font-family:var(--font-body);font-size:10px;font-weight:700;color:var(--text-2);letter-spacing:.8px;text-transform:uppercase;min-width:220px">CALIBRE</span>
    <span style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">10px · 700 · .8px · Field label (Rajdhani)</span>
  </div>
</div>
</body></html>
