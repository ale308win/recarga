<!-- @dsCard group="Colors" viewport="700x110" name="Backgrounds" subtitle="Dark surface stack — bg through bg-4" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);padding:16px;font-family:var(--font-body)}</style>
</head><body>
<div style="display:flex;gap:6px">
  <div style="flex:1;height:68px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
    <div style="font-size:10px;font-weight:700;color:var(--text-2);letter-spacing:.5px">--bg</div>
    <div style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">#0b0b0f</div>
  </div>
  <div style="flex:1;height:68px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
    <div style="font-size:10px;font-weight:700;color:var(--text-2);letter-spacing:.5px">--bg-2</div>
    <div style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">#101018</div>
  </div>
  <div style="flex:1;height:68px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
    <div style="font-size:10px;font-weight:700;color:var(--text-2);letter-spacing:.5px">--bg-3</div>
    <div style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">#161622</div>
  </div>
  <div style="flex:1;height:68px;background:var(--bg-4);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
    <div style="font-size:10px;font-weight:700;color:var(--text-2);letter-spacing:.5px">--bg-4</div>
    <div style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">#1e1e2e</div>
  </div>
  <div style="flex:1;height:68px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
    <div style="font-size:10px;font-weight:700;color:var(--text-2);letter-spacing:.5px">--border</div>
    <div style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">#2a2a3a</div>
  </div>
  <div style="flex:1;height:68px;background:var(--border-2);border:1px solid var(--border-2);border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px">
    <div style="font-size:10px;font-weight:700;color:var(--text-2);letter-spacing:.5px">--border-2</div>
    <div style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">#383850</div>
  </div>
</div>
</body></html>
