<!-- @dsCard group="Colors" viewport="700x120" name="Text Hierarchy" subtitle="Primary, secondary and disabled text on dark backgrounds" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg-3);padding:20px;font-family:var(--font-body)}</style>
</head><body>
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="display:flex;align-items:baseline;gap:16px">
    <span style="color:var(--gold);font-family:var(--font-heading);font-size:20px;font-weight:600;letter-spacing:2px;text-transform:uppercase;min-width:160px">TÍTULO — gold</span>
    <span style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">--gold · #c09a3a · Oswald headings</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:16px">
    <span style="color:var(--text);font-family:var(--font-body);font-size:14px;min-width:160px">Texto primário</span>
    <span style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">--text · #ddd8c4 · Rajdhani body</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:16px">
    <span style="color:var(--text-2);font-family:var(--font-body);font-size:13px;min-width:160px">Texto secundário</span>
    <span style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">--text-2 · #999887 · labels, meta</span>
  </div>
  <div style="display:flex;align-items:baseline;gap:16px">
    <span style="color:var(--text-3);font-family:var(--font-body);font-size:12px;min-width:160px">Desabilitado</span>
    <span style="font-size:10px;color:var(--text-3);font-family:var(--font-mono)">--text-3 · #6e6e58 · disabled/hint</span>
  </div>
</div>
</body></html>
