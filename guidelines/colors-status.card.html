<!-- @dsCard group="Colors" viewport="700x80" name="Performance Status" subtitle="5-grade ballistic scale — Excelente through Crítico" -->
<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg-3);padding:20px;font-family:var(--font-body)}</style>
</head><body>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
  <span style="display:inline-block;font-size:11px;font-weight:700;padding:4px 14px;border-radius:10px;background:rgba(46,125,50,.25);color:#81c784;border:1px solid rgba(46,125,50,.4)">Excelente</span>
  <span style="display:inline-block;font-size:11px;font-weight:700;padding:4px 14px;border-radius:10px;background:rgba(124,179,66,.2);color:#aed581;border:1px solid rgba(124,179,66,.35)">Bom</span>
  <span style="display:inline-block;font-size:11px;font-weight:700;padding:4px 14px;border-radius:10px;background:rgba(249,168,37,.2);color:#ffd54f;border:1px solid rgba(249,168,37,.35)">Aceitável</span>
  <span style="display:inline-block;font-size:11px;font-weight:700;padding:4px 14px;border-radius:10px;background:rgba(230,81,0,.2);color:#ffb74d;border:1px solid rgba(230,81,0,.35)">Ruim</span>
  <span style="display:inline-block;font-size:11px;font-weight:700;padding:4px 14px;border-radius:10px;background:rgba(198,40,40,.25);color:#ef9a9a;border:1px solid rgba(198,40,40,.4)">Crítico</span>
  <span style="font-size:10px;color:var(--text-3);margin-left:8px;font-family:var(--font-mono)">SD · ES% · ES · Energia</span>
</div>
</body></html>
