const Login=({onLogin})=>{
  const[tab,setTab]=useState('in');

  const[senha,setSenha]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const[registered,setRegistered]=useState(false);

  const go=async()=>{
    if(!email||!senha){setErr('Preencha todos os campos.');return;}
    if(!email.includes('@')){setErr('E-mail inválido.');return;}
    if(tab==='up'&&senha.length<8){setErr('Senha mínima: 8 caracteres.');return;}
    setErr('');setLoading(true);
    try{
      if(tab==='in'){
        const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
        if(error){setErr(error.message.includes('Invalid')||error.message.includes('credentials')?'E-mail ou senha incorretos.':error.message);}
        else{const u={email:data.user.email,name:data.user.user_metadata?.name||email.split('@')[0]};localStorage.setItem('ale308_user',JSON.stringify(u));onLogin(u);}
      }else{
        const{data,error}=await sb.auth.signUp({email,password:senha,options:{data:{name:nome||email.split('@')[0]}}});
        if(error){setErr(error.message);}
        else if(data.session){const u={email:data.user.email,name:nome||email.split('@')[0]};localStorage.setItem('ale308_user',JSON.stringify(u));onLogin(u);}
        else{setRegistered(true);}
      }
    }catch(e){setErr('Erro: '+e.message);}
    setLoading(false);
  };
  const lbl={fontSize:11,fontFamily:'Barlow Condensed',fontWeight:700,color:C.tx2,letterSpacing:1,marginBottom:4,display:'block'};

    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:C.bg,padding:16}}>

        <p style={{color:C.tx2,fontSize:13,lineHeight:1.7,marginBottom:16}}>Verifique seu e-mail e clique no link de confirmação.<br/>Depois volte aqui e faça login.</p>
        <button onClick={()=>{setRegistered(false);setTab('in');}} className="ale-btn" style={{background:C.gold,color:'#0d1117',padding:'10px 24px',fontSize:13,width:'100%'}}>FAZER LOGIN</button>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0d1117',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 0%,rgba(212,165,32,.15),transparent 60%)'}}/>
      <div style={{position:'relative',zIndex:1,width:'100%',maxWidth:420,padding:'0 16px',textAlign:'center'}}>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:8,filter:'drop-shadow(0 0 24px rgba(212,165,32,.5))'}}>🎯</div>
          <div style={{fontFamily:'Barlow Condensed',fontSize:22,fontWeight:800,color:C.gold,letterSpacing:4}}>ÁREA DO ATIRADOR · @ALE308WIN</div>
          <div style={{fontFamily:'Barlow Condensed',fontSize:12,color:C.tx2,letterSpacing:3,marginTop:4}}>ÁREA DO ATIRADOR</div>
        </div>
        <div style={{background:'rgba(22,27,34,.98)',border:`1px solid ${C.bd}`,borderRadius:8,overflow:'hidden'}}>
          <div style={{display:'flex',borderBottom:`1px solid ${C.bd}`}}>
            {[['in','ENTRAR'],['up','CRIAR CONTA']].map(([t,l])=>(
              <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:13,background:'none',border:'none',borderBottom:`2px solid ${tab===t?C.gold:'transparent'}`,color:tab===t?C.gold:C.tx2,fontFamily:'Barlow Condensed',fontSize:13,fontWeight:700,letterSpacing:2,cursor:'pointer',transition:'all .15s'}}>{l}</button>
            ))}
          </div>
          <div style={{padding:22}}>
            {tab==='up'&&<div style={{marginBottom:11}}><label style={lbl}>NOME</label><input className="ale-input" value={nome} onChange={e=>setNome(e.target.value)} placeholder="Seu nome" /></div>}

      </div>
    </div>

/* ── CUSTO DE RECARGA ────────────────────────────────────────────────────── */
const Custo=({user,onBack})=>{
  const[cal,setCal]=useState(()=>{try{return localStorage.getItem('ale308_cal')||'.38 SPL';}catch{return'.38 SPL';}});
  const[showCustom,setShowCustom]=useState(false);
  const[customCalInput,setCustomCalInput]=useState('');
  const[idx,setIdx]=useState(0);

  const[data,setData]=useState(()=>{
    try{
      const s=localStorage.getItem('ale308_custos');
      if(s){
        const p=JSON.parse(s);
        // migrate old polTipo → polFab/polModelo
        for(const k of Object.keys(p)){
          if(p[k].cargas){
            p[k].cargas=p[k].cargas.map(c=>{
              if(c.ammoPU===undefined){c.ammoPU=c.ammoP&&c.ammoQ?parseFloat((c.ammoP/c.ammoQ).toFixed(4)):0;}
              if(c.polFab===undefined&&c.polTipo!==undefined){
                const t=c.polTipo||'';
                const fab=t.startsWith('CBC')?'CBC':t.toLowerCase().includes('imbel')?'IMBEL':'';
                return{...c,polFab:fab,polModelo:t,polLote:''};
              }
              return c;
            });
          }
          if(p[k].perda===undefined) p[k].perda=10;
        }
        return p;
      }
    }catch{}
    return CALS;
  });

  useEffect(()=>{localStorage.setItem('ale308_custos',JSON.stringify(data));},[data]);
  useEffect(()=>{localStorage.setItem('ale308_cal',cal);},[cal]);
  useEffect(()=>setIdx(0),[cal]);

  const calData=data[cal]||{cat:'',perda:10,cargas:[]};
  const cargas=calData.cargas||[];
  const perda=calData.perda??10;
  const carga=cargas[idx]||cargas[0]||{};

  const setPerda=v=>setData(prev=>({...prev,[cal]:{...prev[cal],perda:parseInt(v)}}));
  const set=(k,v)=>setData(prev=>{const c=[...prev[cal].cargas];c[idx]={...c[idx],[k]:v};return{...prev,[cal]:{...prev[cal],cargas:c}};});
  const setFields=obj=>setData(prev=>{const c=[...prev[cal].cargas];c[idx]={...c[idx],...obj};return{...prev,[cal]:{...prev[cal],cargas:c}};});

  const handlePolFab=v=>{const mods=PD[v]||[];setFields({polFab:v,polModelo:mods.includes(carga.polModelo)?carga.polModelo:(mods[0]||'')});};
  const polModelos=carga.polFab&&PD[carga.polFab]?PD[carga.polFab]:[];

  const selectCal=v=>{
    if(v==='__outro__'){setShowCustom(true);return;}
    setShowCustom(false);
    if(!data[v]){setData(prev=>({...prev,[v]:{cat:'',perda:10,cargas:[defCarga(0)]}}));}
    setCal(v);
  };
  const addCustomCal=()=>{
    const n=customCalInput.trim();if(!n)return;
    if(!data[n]){setData(prev=>({...prev,[n]:{cat:'',perda:10,cargas:[defCarga(0)]}}));}
    setCal(n);setShowCustom(false);setCustomCalInput('');
  };

  const addCarga=()=>{const base={...carga,id:rid(),label:`Carga ${cargas.length+1}`};setData(prev=>{const c=[...prev[cal].cargas,base];return{...prev,[cal]:{...prev[cal],cargas:c}};});setIdx(cargas.length);};
  const delCarga=()=>{if(cargas.length<=1)return;setData(prev=>{const c=prev[cal].cargas.filter((_,i)=>i!==idx);return{...prev,[cal]:{...prev[cal],cargas:c}};});setIdx(Math.max(0,idx-1));};

  const results=useMemo(()=>cargas.map(c=>calc(c,perda)),[JSON.stringify(cargas),perda]);
  const res=results[idx]||{};
  const SESS=[50,100,500,1000];

  const exportPDF=()=>{
    const html=buildPDF(cal,cargas,idx,results,perda);
    try{
      const blob=new Blob([html],{type:'text/html'});
      const url=URL.createObjectURL(blob);
      const win=window.open(url,'_blank');
      if(!win){alert('Ative popups para exportar o PDF.\n\nOu: tente novamente após permitir popups para esta página.');return;}
      setTimeout(()=>win.print(),600);
    }catch(e){alert('Erro ao gerar PDF: '+e.message);}
  };

  const TR=({label,vals,bold,gold,green})=>(
    <tr style={{borderBottom:`1px solid ${C.bds}`}}>
      <td style={{padding:'7px 10px',fontSize:12,fontFamily:'Barlow Condensed',fontWeight:bold?700:400,color:gold?C.gold:green?C.greenTx:C.tx2,background:C.sf,whiteSpace:'nowrap'}}>{label}</td>
      {vals.map((v,i)=>(
        <td key={i} style={{padding:'7px 10px',textAlign:'right',fontFamily:'Barlow Condensed',fontSize:bold?15:13,fontWeight:bold?800:500,color:gold?C.gold:green?C.greenTx:C.tx,background:i===idx?C.sf2:C.sf}}>{v}</td>

    </tr>

  const builtinCals=CALIBERS;

      <div style={{background:C.sf,borderBottom:`1px solid ${C.bd}`,display:'flex',alignItems:'center',gap:8,padding:'0 12px',height:54,position:'sticky',top:0,zIndex:10}}>
        <span style={{fontSize:18}}>🎯</span>
        <span style={{fontFamily:'Barlow Condensed',fontSize:17,fontWeight:800,color:C.gold,letterSpacing:2,marginRight:4}}>CUSTO DE RECARGA</span>
        <div style={{flex:1}}/>
        <button onClick={exportPDF} className="ale-btn" style={{background:C.sf3,color:C.greenTx,border:`1px solid ${C.bd}`,padding:'5px 12px',fontSize:11,display:'flex',alignItems:'center',gap:4}}>
          ⬇ PDF
        </button>
        <button onClick={onBack} className="ale-btn" style={{background:C.sf2,color:C.tx2,border:`1px solid ${C.bd}`,padding:'5px 12px',fontSize:11}}>← HUB</button>
        <IgLink/>
      </div>

      {/* Caliber Row */}
      <div style={{background:C.sf,borderBottom:`1px solid ${C.bds}`,padding:'10px 14px'}}>
        <div style={{maxWidth:1360,margin:'0 auto',display:'flex',gap:10,alignItems:'flex-end',flexWrap:'wrap'}}>
          <div style={{flex:'1 1 200px',minWidth:160}}>
            <LBL>Calibre</LBL>
            <select className="ale-input" value={builtinCals.includes(cal)||customCals.includes(cal)?cal:''} onChange={e=>selectCal(e.target.value)}>
              <optgroup label="Calibres Padrão">
                {builtinCals.map(c=><option key={c} value={c}>{c}</option>)}
              </optgroup>
              {customCals.length>0&&<optgroup label="Meus Calibres">{customCals.map(c=><option key={c} value={c}>⚡ {c}</option>)}</optgroup>}
              <option value="__outro__">— Adicionar novo calibre —</option>
            </select>
          </div>
          {showCustom&&(
            <>
              <div style={{flex:'1 1 160px',minWidth:130}}>
                <LBL>Nome do calibre</LBL>
                <input className="ale-input" value={customCalInput} onChange={e=>setCustomCalInput(e.target.value)} placeholder="Ex: .357 SIG" onKeyDown={e=>e.key==='Enter'&&addCustomCal()} />
              </div>
              <button onClick={addCustomCal} className="ale-btn" style={{background:C.gold,color:'#0d1117',padding:'8px 14px',fontSize:12,height:38,flexShrink:0}}>ADICIONAR</button>
              <button onClick={()=>{setShowCustom(false);setCustomCalInput('');}} className="ale-btn" style={{background:C.sf3,color:C.tx2,border:`1px solid ${C.bd}`,padding:'8px 10px',fontSize:12,height:38,flexShrink:0}}>✕</button>
            </>

          {/* Load tabs */}
          <div style={{display:'flex',gap:6,alignItems:'flex-end',flexWrap:'wrap'}}>
            {cargas.map((c,i)=>(
              <button key={c.id} onClick={()=>setIdx(i)} className={`load-tab${idx===i?' on':''}`}>{c.label}</button>

            <button onClick={addCarga} className="ale-btn" style={{background:C.gold,color:'#0d1117',padding:'6px 12px',fontSize:11,height:32}}>+ CARGA</button>
            {cargas.length>1&&<button onClick={delCarga} className="ale-btn" style={{background:C.red,color:'#fff',padding:'6px 9px',fontSize:11,height:32}}>✕</button>}
          </div>
        </div>
      </div>

      {/* Main 2-col */}
      <div className="two-col" style={{padding:'14px',maxWidth:1360,margin:'0 auto'}}>

        {/* ── LEFT: Inputs ── */}
        <div style={{minWidth:0}}>

          {/* ESTOJO */}
          <SC icon="🔩" title="Estojo">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:9,marginBottom:9}}>
              <NI label="Qtd no lote"   value={carga.eQ}  onChange={v=>set('eQ',v)}  step="1" />
              <NI label="Valor R$"      value={carga.eP}  onChange={v=>set('eP',v)} />

            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
              <TI label="Tipo / Lote"   value={carga.eTipo||''} onChange={v=>set('eTipo',v)} />
              <CostPill label="Custo / cartucho" value={res.e} />
            </div>
          </SC>

          {/* ESPOLETA */}
          <SC icon="💥" title="Espoleta">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:9}}>

              <Sel label="Modelo" value={carga.polModelo||''} onChange={v=>set('polModelo',v)} options={polModelos} placeholder={polModelos.length===0?'Selecione fabricante...':'Selecione...'} />

                {Array.from({length:15},(_,i)=>i+1).map(n=><option key={n} value={n}>{n}%</option>)}
              </select>
            </div>
          }>
            {[{label:'Estojo',v:res.pct?.e||0,cost:res.e,color:'#3b82f6'},{label:'Espoleta',v:res.pct?.esp||0,cost:res.esp,color:'#8b5cf6'},{label:'Pólvora',v:res.pct?.p||0,cost:res.p,color:'#f97316'},{label:'Projétil',v:res.pct?.pr||0,cost:res.pr,color:'#22c55e'}].map(item=>(

const App=()=>{
  const[screen,setScreen]=useState('loading');
  const[user,setUser]=useState(null);

  // Hash routing: sync URL hash ↔ screen state
  const goScreen=(s,pushHistory=true)=>{
    if(pushHistory && s!=='loading' && s!=='login'){
      history.pushState({screen:s},'',s==='custos'?'#custos':'#hub');
    }
    setScreen(s);
  };
  useEffect(()=>{
    // Handle browser back/forward
    const onPop=(e)=>{
      const hash=window.location.hash;
      if(hash==='#custos')setScreen('custos');
      else setScreen('hub');
    };
    window.addEventListener('popstate',onPop);
    return()=>window.removeEventListener('popstate',onPop);
  },[]);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session){
        const u={email:session.user.email,name:session.user.user_metadata?.name||session.user.email.split('@')[0]};
        setUser(u);localStorage.setItem('ale308_user',JSON.stringify(u));
        const s=window.location.hash==='#custos'?'custos':'hub';
        goScreen(s,false);
      }else{setScreen('login');}
    });
  },[]);
  const login=u=>{setUser(u);goScreen('hub');};
  const logout=async()=>{await sb.auth.signOut();localStorage.removeItem('ale308_user');setUser(null);history.replaceState({},'','#');setScreen('login');};
  const select=id=>{if(id==='custos')goScreen('custos');};
  if(screen==='loading')return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12}}>
      <div style={{fontSize:32,filter:'drop-shadow(0 0 16px rgba(212,165,32,.4))'}}>🎯</div>
      <div style={{fontFamily:'Barlow Condensed',color:C.gold,fontSize:13,letterSpacing:3}}>CARREGANDO...</div>
    </div>
  );
  if(screen==='login') return <Login onLogin={login}/>;
  if(screen==='hub')   return <Hub user={user} onSelect={select} onLogout={logout}/>;
  if(screen==='custos')return <Custo user={user} onBack={()=>{history.back();}}/>;
  return <Hub user={user} onSelect={select} onLogout={logout}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
